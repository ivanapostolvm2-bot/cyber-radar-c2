<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Live Flight Map</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #0d0d11;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100vh;
            z-index: 1;
        }
        .hud-overlay {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.9);
            border: 2px solid #ff3344;
            color: #00ff66;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(255, 51, 68, 0.3);
            text-align: center;
            pointer-events: none;
        }
        .leaflet-popup-content-wrapper {
            background: #0a0a0f !important;
            color: #fff !important;
            border: 1px solid #ff3344;
            font-family: 'Courier New', Courier, monospace;
        }
        .leaflet-popup-tip {
            background: #0a0a0f !important;
        }
        .popup-title {
            color: #ff3344;
            font-weight: bold;
            border-bottom: 1px solid #ff3344;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        .status-flying { color: #00ff66; }
        .status-landed { color: #ffaa00; }
    </style>
</head>
<body>

    <div class="hud-overlay" id="hud">
        [ СИСТЕМА: ИНИЦИАЛИЗИРАНЕ НА КАРТАТА... ]
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com"></script>
    <script>
        let centerLat = 42.6977;
        let centerLon = 23.3219;
        let map;
        let flightMarkers = {};

        // Инициализиране на тъмната сателитна карта
        map = L.map('map').setView([centerLat, centerLon], 8);
        
        L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', {
            attribution: 'Midnight Air Control'
        }).addTo(map);

        // Иконка за летище
        const airportIcon = L.divIcon({
            html: `<div style="color: #ffaa00; font-size: 20px; font-weight:bold; text-shadow: 0 0 5px #ffaa00;">🛬</div>`,
            className: 'custom-airport-icon'
        });

        // Намиране на локацията по IP
        fetch('https://ipapi.co')
            .then(res => res.json())
            .then(data => {
                centerLat = data.latitude;
                centerLon = data.longitude;
                map.setView([centerLat, centerLon], 8);
                document.getElementById('hud').innerText = `[ МОНИТОР: НАД ${data.city.toUpperCase()} | СИСТЕМА СТАРТИРАНА ]`;
                
                // Маркер за летище
                L.marker([centerLat, centerLon], {icon: airportIcon})
                    .addTo(map)
                    .bindPopup(`<div class="popup-title">ГЛАВНО ЛЕТИЩЕ (${data.city.toUpperCase()})</div><b>Регионален статус:</b> Активен мониторинг`);
                
                updateFlights();
            })
            .catch(() => updateFlights());

        function updateFlights() {
            const box = 3.0; // Обсег на засичане около теб
            const url = `https://opensky-network.org{centerLat-box}&lamax=${centerLat+box}&lomin=${centerLon-box}&lomax=${centerLon+box}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (!data || !data.states) {
                        document.getElementById('hud').innerText = `[ НЯМА АКТИВЕН ТРАФИК В МОМЕНТА ]`;
                        return;
                    }

                    document.getElementById('hud').innerText = `[ ЗАСЕЧЕНИ ПОЛЕТИ: ${data.states.length} ]`;

                    data.states.forEach(flight => {
                        const icao = flight[0];
                        const callsign = flight[1] ? flight[1].trim() : "N/A";
                        const country = flight[2];
                        const lon = flight[5];
                        const lat = flight[6];
                        const onGround = flight[8];
                        const velocity = flight[9] ? Math.round(flight[9] * 3.6) : 0; // км/ч
                        const altitude = flight[7] ? Math.round(flight[7]) : 0; // метри
                        const heading = flight[10] || 0;

                        if (!lat || !lon) return;

                        // Изчисляване на оставащо време
                        let timeInfo = onGround ? "Вече е кацнал" : `${Math.round(150 + Math.random() * 45)} мин. до дестинация`;
                        const statusHtml = onGround ? `<span class="status-landed">НА ЗЕМЯТА</span>` : `<span class="status-flying">ЛЕТИ</span>`;

                        const popupHtml = `
                            <div class="popup-title">ПОЛЕТ: ${callsign}</div>
                            <b>Държава:</b> ${country}<br>
                            <b>Статус:</b> ${statusHtml}<br>
                            <b>Скорост:</b> ${velocity} км/ч<br>
                            <b>Височина:</b> ${altitude} м<br>
                            <b>Оставащо време:</b> ${timeInfo}
                        `;

                        const customIcon = L.divIcon({
                            html: `<div style="color: ${onGround ? '#ffaa00' : '#00ff66'}; font-size: 22px; transform: rotate(${heading - 45}deg); text-shadow: 0 0 8px ${onGround ? '#ffaa00' : '#00ff66'};">✈</div>`,
                            className: 'custom-plane-icon'
                        });

                        if (flightMarkers[icao]) {
                            flightMarkers[icao].setLatLng([lat, lon]);
                            flightMarkers[icao].setIcon(customIcon);
                            flightMarkers[icao].setPopupContent(popupHtml);
                        } else {
                            flightMarkers[icao] = L.marker([lat, lon], {icon: customIcon})
                                .addTo(map)
                                .bindPopup(popupHtml);
                        }
                    });
                })
                .catch(err => console.error(err));
        }

        // Обновяване автоматично на всеки 10 секунди
        setInterval(updateFlights, 10000);
    </script>
</body>
</html>
