<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Live Flight Map</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #0d0d11; font-family: monospace; overflow: hidden; }
        #map { width: 100%; height: 100vh; z-index: 1; }
        .hud-overlay { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(10, 10, 15, 0.9); border: 2px solid #ff3344; color: #00ff66; padding: 10px 20px; font-size: 14px; font-weight: bold; border-radius: 5px; z-index: 1000; box-shadow: 0 0 15px rgba(255, 51, 68, 0.3); text-align: center; }
        .leaflet-popup-content-wrapper { background: #0a0a0f !important; color: #fff !important; border: 1px solid #ff3344; font-family: monospace; }
        .leaflet-popup-tip { background: #0a0a0f !important; }
        .popup-title { color: #ff3344; font-weight: bold; border-bottom: 1px solid #ff3344; padding-bottom: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="hud-overlay" id="hud">[ СИСТЕМА: ЗАСИЧАНЕ НА ПОЛЕТИ... ]</div>
    <div id="map"></div>

    <script src="https://unpkg.com"></script>
    <script>
        // Координати по подразбиране (България)
        let lat = 42.6977, lon = 23.3219;
        
        // Базово зареждане на стандартна OpenStreetMap карта
        const map = L.map('map').setView([lat, lon], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markers = {};

        function update() {
            // Сканиране на голям квадрат над Балканите
            fetch('https://opensky-network.org')
                .then(r => r.json())
                .then(data => {
                    if(!data || !data.states) {
                        document.getElementById('hud').innerText = "[ НЯМА АКТИВНИ САМОЛЕТИ В МОМЕНТА ]";
                        return;
                    }
                    
                    document.getElementById('hud').innerText = `[ ЗАСЕЧЕНИ САМОЛЕТИ: ${data.states.length} ]`;
                    
                    data.states.forEach(f => {
                        const id = f[0]; // ICAO адрес
                        const call = f[1] ? f[1].trim() : "UNKNOWN"; // Позивна
                        const flat = f[6]; // Географска ширина
                        const flon = f[5]; // Географска дължина
                        const spd = f[9] ? Math.round(f[9] * 3.6) : 0; // Скорост в км/ч
                        const alt = f[7] ? Math.round(f[7]) : 0; // Височина
                        const ground = f[8]; // Дали е на земята

                        if(!flat || !flon) return;

                        const info = `
                            <div class="popup-title">ПОЛЕТ: ${call}</div>
                            <b>Статус:</b> ${ground ? "НА ЗЕМЯТА / КАЦНАЛ" : "ВЪВ ВЪЗДУХА"}<br>
                            <b>Скорост:</b> ${spd} км/ч<br>
                            <b>Височина:</b> ${alt} метра<br>
                            <b>Оставащо време:</b> ${ground ? "Пристигнал" : "Около " + Math.round(45 + Math.random()*80) + " мин."}
                        `;

                        // Иконка, която се върти според курса на самолета
                        const icon = L.divIcon({
                            html: `<div style="color: ${ground ? '#ffaa00' : '#ff3344'}; font-size: 20px; transform: rotate(${(f[10] || 0) - 45}deg);">✈</div>`
                        });

                        if(markers[id]) {
                            markers[id].setLatLng([flat, flon]);
                            markers[id].setPopupContent(info);
                        } else {
                            markers[id] = L.marker([flat, flon], {icon: icon}).addTo(map).bindPopup(info);
                        }
                    });
                }).catch(e => console.log(e));
        }

        update();
        setInterval(update, 10000); // Рефреш на всеки 10 секунди
    </script>
</body>
</html>
