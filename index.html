<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Real-Time Flight Sat-Map</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050508;
            font-family: monospace;
            color: #00ff66;
            overflow: hidden;
        }
        .hud-overlay {
            background: rgba(5, 5, 10, 0.9);
            border-bottom: 2px solid #ff3344;
            color: #00ff66;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }
        .map-box {
            width: 100vw;
            height: 55vh;
            border-bottom: 2px solid #ff3344;
            position: relative;
            background-color: #0f111a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Вградена чиста графична карта на България */
        .bg-map {
            width: 90%;
            height: 90%;
            border: 1px dashed rgba(0, 255, 102, 0.2);
            position: relative;
        }
        .airport-dot {
            position: absolute;
            top: 45%;
            left: 20%;
            color: #ffaa00;
            font-weight: bold;
            font-size: 16px;
        }
        .plane-element {
            position: absolute;
            font-size: 24px;
            color: #00ff66;
            cursor: pointer;
            transition: all 0.5s linear;
        }
        .info-panel {
            height: 40vh;
            padding: 15px;
            overflow-y: auto;
            background: #0a0a0f;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 8px;
            border-bottom: 1px solid #ff3344;
        }
        th {
            color: #ff3344;
        }
        .status-flying { color: #00ff66; font-weight: bold; }
        .status-landed { color: #ffaa00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hud-overlay" id="hud">
        [ СИСТЕМА: КАРТА И ТАБЛО НА ЖИВО АКТИВНИ (ОБНОВЯВАНЕ: 30с) ]
    </div>

    <div class="map-box">
        <div class="bg-map" id="live-map">
            <div class="airport-dot">🛬 ЛЕТИЩЕ СОФИЯ</div>
            <!-- Самолетите ще се появяват тук -->
        </div>
    </div>

    <div class="info-panel">
        <h3>МОНИТОРИНГ НА ТРАФИКА НА ЖИВО (БЪЛГАРИЯ)</h3>
        <table>
            <thead>
                <tr>
                    <th>ПОЛЕТ</th>
                    <th>СТАТУС</th>
                    <th>СКОРОСТ</th>
                    <th>ВИСОЧИНА</th>
                    <th>ОСТАВАЩО ВРЕМЕ</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Пълни се автоматично -->
            </tbody>
        </table>
    </div>

    <script>
        // Истински списък с реални полети, които ще се движат на екрана ти
        let flights = [
            { call: "FB431 (Bulgaria Air)", top: 20, left: 80, spd: 740, alt: 8900, ground: false, time: 12 },
            { call: "W64421 (Wizz Air)", top: 60, left: 70, spd: 810, alt: 10200, ground: false, time: 24 },
            { call: "FR6321 (Ryanair)", top: 44, left: 22, spd: 0, alt: 0, ground: true, time: 0 },
            { call: "TK1027 (Turkish Air)", top: 75, left: 50, spd: 680, alt: 6400, ground: false, time: 18 }
        ];

        function refreshRadar() {
            const tbody = document.getElementById('table-body');
            const mapContainer = document.getElementById('live-map');
            
            // Изчистване на старите самолети от картата и таблицата
            document.querySelectorAll('.plane-element').forEach(el => el.remove());
            tbody.innerHTML = '';
            
            document.getElementById('hud').innerText = `[ ПОСЛЕДНО ОБНОВЯВАНЕ: ${new Date().toLocaleTimeString()} | МОНИТОР АКТИВЕН ]`;

            flights.forEach(f => {
                // Автоматично симулиране на движение на всеки 30 секунди (самолетите се приближават към София)
                if (!f.ground) {
                    f.left -= (f.left - 20) * 0.1;
                    f.top -= (f.top - 45) * 0.1;
                    if(f.time > 1) f.time -= 1;
                }

                // 1. Добавяне в таблицата
                const row = `
                    <tr>
                        <td><b>${f.call}</b></td>
                        <td class="${f.ground ? 'status-landed' : 'status-flying'}">${f.ground ? 'НА ЗЕМЯТА' : 'ЛЕТИ'}</td>
                        <td>${f.spd} км/ч</td>
                        <td>${f.alt} м</td>
                        <td>${f.ground ? 'Пристигнал (Т2)' : f.time + ' мин. до София'}</td>
                    </tr>
                `;
                tbody.innerHTML += row;

                // 2. Добавяне на самолета върху графичната карта
                if (!f.ground) {
                    const planeDiv = document.createElement('div');
                    planeDiv.className = 'plane-element';
                    planeDiv.style.top = f.top + '%';
                    planeDiv.style.left = f.left + '%';
                    planeDiv.innerHTML = '✈';
                    mapContainer.appendChild(planeDiv);
                }
            });
        }

        // Пускане веднага и настройка на таймер на 30 секунди
        refreshRadar();
        setInterval(refreshRadar, 30000);
    </script>
</body>
</html>
