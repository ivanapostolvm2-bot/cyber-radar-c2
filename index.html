<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Flight Tracker Radar</title>
    <style>
        body {
            background-color: #0a0a0c;
            color: #ff3344;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            text-shadow: 0 0 10px #ff3344;
            margin-bottom: 5px;
        }
        .status {
            color: #00ff66;
            text-shadow: 0 0 8px #00ff66;
            margin-bottom: 20px;
        }
        .radar-container {
            position: relative;
            width: 400px;
            height: 400px;
            border: 2px solid #ff3344;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 51, 68, 0.2);
            background: radial-gradient(circle, rgba(255,51,68,0.05) 0%, rgba(10,10,12,1) 70%);
        }
        .radar-sweep {
            position: absolute;
            width: 100%;
            height: 100%;
            background: conic-gradient(from 0deg, rgba(255, 51, 68, 0.4) 0deg, transparent 90deg);
            border-radius: 50%;
            animation: rotate 4s linear infinite;
            z-index: 1;
        }
        .plane-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #00ff66;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px #00ff66;
            z-index: 2;
            cursor: pointer;
        }
        .plane-label {
            position: absolute;
            color: #00ff66;
            font-size: 10px;
            white-space: nowrap;
            margin-top: 12px;
            margin-left: 5px;
            background: rgba(0,0,0,0.7);
            padding: 2px;
            border-radius: 3px;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>AIRSPACE REAL-TIME RADAR</h1>
    <div id="radar-status" class="status">[ ТЪРСЕНЕ НА САМОЛЕТИ В РЕГИОНА... ]</div>
    
    <div class="radar-container" id="radar">
        <div class="radar-sweep"></div>
    </div>

    <script>
        // Координати по подразбиране (България)
        let userLat = 42.6977;
        let userLon = 23.3219;

        // Автоматично намиране на твоята локация през IP
        fetch('https://ipapi.co')
            .then(res => res.json())
            .then(data => {
                userLat = data.latitude;
                userLon = data.longitude;
                document.getElementById('radar-status').innerText = `[ ЗАСИЧАНЕ НАД: ${data.city.toUpperCase()} ]`;
                getPlanes();
            })
            .catch(() => getPlanes());

        function getPlanes() {
            // Сканира за самолети в радиус около теб през OpenSky API
            const box = 1.5; // Радиус на обсега
            const url = `https://opensky-network.org{userLat-box}&lamin=${userLat-box}&lamax=${userLat+box}&lomin=${userLon-box}&lomax=${userLon+box}`;
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    // Премахване на старите самолети от екрана преди рефреш
                    document.querySelectorAll('.plane-dot').forEach(el => el.remove());
                    
                    if(!data.states) {
                        document.getElementById('radar-status').innerText = `[ НЯМА ОТКРИТИ САМОЛЕТИ В МОМЕНТА ]`;
                        return;
                    }

                    document.getElementById('radar-status').innerText = `[ ЗАСЕЧЕНИ: ${data.states.length} САМОЛЕТА НАД ТЕБ ]`;

                    data.states.slice(0, 10).forEach(plane => {
                        const callsign = plane[1] || "UNKNOWN";
                        const pLat = plane[6];
                        const pLon = plane[5];

                        if (!pLat || !pLon) return;

                        // Изчисляване на позицията върху кръглия радар
                        const xDiff = (pLon - userLon) * 120 + 200;
                        const yDiff = 200 - (pLat - userLat) * 120;

                        // Ограничаване вътре в радара
                        if(xDiff > 0 && xDiff < 400 && yDiff > 0 && yDiff < 400) {
                            const dot = document.createElement('div');
                            dot.className = 'plane-dot';
                            dot.style.left = `${xDiff}px`;
                            dot.style.top = `${yDiff}px`;

                            const label = document.createElement('div');
                            label.className = 'plane-label';
                            label.innerText = callsign.trim();
                            dot.appendChild(label);

                            document.getElementById('radar').appendChild(dot);
                        }
                    });
                });
        }

        // Обновяване на всеки 15 секунди
        setInterval(getPlanes, 15000);
    </script>
</body>
</html>
