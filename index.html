<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Real-Time Flight Sat-Map</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050508;
            font-family: monospace;
            color: #00ff66;
            overflow: hidden;
        }
        #map {
            width: 100vw;
            height: 55vh;
            border-bottom: 2px solid #ff3344;
        }
        .hud-overlay {
            background: rgba(5, 5, 10, 0.9);
            border-bottom: 2px solid #ff3344;
            color: #00ff66;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }
        .info-panel {
            height: 40vh;
            padding: 15px;
            overflow-y: auto;
            background: #0a0a0f;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 8px;
            border-bottom: 1px solid #ff3344;
        }
        th {
            color: #ff3344;
        }
        .status-flying { color: #00ff66; font-weight: bold; }
        .status-landed { color: #ffaa00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hud-overlay" id="hud">
        [ СИСТЕМА: САТЕЛИТЕН МОНИТОР НА ЖИВО АКТИВЕН (ОБНОВЯВАНЕ: 30с) ]
    </div>

    <div id="map"></div>

    <div class="info-panel">
        <h3>МОНИТОРИНГ НА ТРАФИКА НА ЖИВО (БЪЛГАРИЯ)</h3>
        <table>
            <thead>
                <tr>
                    <th>ПОЛЕТ</th>
                    <th>СТАТУС</th>
                    <th>СКОРОСТ</th>
                    <th>ВИСОЧИНА</th>
                    <th>ОСТАВАЩО ВРЕМЕ</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Тук JavaScript автоматично ще добавя истинските самолети -->
            </tbody>
        </table>
    </div>

    <script src="https://unpkg.com"></script>
    <script>
        // Инициализиране на сателитната карта над България
        const map = L.map('map').setView([42.6977, 23.3219], 8);

        L.tileLayer('https://arcgisonline.com{z}/{y}/{x}', {
            attribution: 'Esri Satellite Imagery'
        }).addTo(map);

        let markers = {};

        function fetchRealData() {
            // Използваме стабилен публичен сървър с реални данни за полети без ограничения
            fetch('https://allorigins.win' + encodeURIComponent('https://opensky-network.org'))
                .then(response => response.json())
                .then(raw => {
                    const data = JSON.parse(raw.contents);
                    const tbody = document.getElementById('table-body');
                    
                    if(!data || !data.states) {
                        document.getElementById('hud').innerText = "[ СИСТЕМА: В МОМЕНТА НЯМА ПОЛЕТИ НАД БЪЛГАРИЯ ]";
                        return;
                    }

                    // Изчистване на старото табло преди новото записване
                    tbody.innerHTML = '';
                    document.getElementById('hud').innerText = `[ СИСТЕМА: ПОСЛЕДНО ОБНОВЯВАНЕ: ${new Date().toLocaleTimeString()} | ЗАСЕЧЕНИ: ${data.states.length} ]`;

                    data.states.forEach(f => {
                        const id = f[0];
                        const callsign = f[1] ? f[1].trim() : "N/A";
                        const lon = f[5];
                        const lat = f[6];
                        const onGround = f[8];
                        const speed = f[9] ? Math.round(f[9] * 3.6) : 0; // в км/ч
                        const alt = f[7] ? Math.round(f[7]) : 0; // в метри
                        const heading = f[10] || 0;

                        if (!lat || !lon) return;

                        // Изчисляване на реално оставащо време (базирано на разстоянието до София)
                        let distanceToSofia = Math.sqrt(Math.pow(lat - 42.69, 2) + Math.pow(lon - 23.40, 2)) * 111; // в км
                        let minutesLeft = speed > 100 ? Math.round((distanceToSofia / speed) * 60) : 0;
                        let timeInfo = onGround ? "Пристигнал" : (minutesLeft > 0 ? `${minutesLeft} мин. до София` : "Близо до кацане");

                        // 1. Добавяне в таблицата под картата
                        const row = `
                            <tr>
                                <td>${callsign}</td>
                                <td class="${onGround ? 'status-landed' : 'status-flying'}">${onGround ? 'НА ЗЕМЯТА' : 'ЛЕТИ'}</td>
                                <td>${speed} км/ч</td>
                                <td>${alt} м</td>
                                <td>${timeInfo}</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;

                        // 2. Добавяне / Преместване на иконката на истинския самолет върху сателита
                        const icon = L.divIcon({
                            html: `<div style="color: ${onGround ? '#ffaa00' : '#00ff66'}; font-size: 26px; font-weight: bold; text-shadow: 2px 2px 3px #000; transform: rotate(${heading - 45}deg); transition: all 0.5s;">✈</div>`
                        });

                        const popupContent = `<b>Полет:</b> ${callsign}<br><b>Скорост:</b> ${speed} км/ч<br><b>Височина:</b> ${alt} м`;

                        if (markers[id]) {
                            markers[id].setLatLng([lat, lon]);
                            markers[id].setIcon(icon);
                            markers[id].setPopupContent(popupContent);
                        } else {
                            markers[id] = L.marker([lat, lon], {icon: icon}).addTo(map).bindPopup(popupContent);
                        }
                    });
                }).catch(e => console.error("Грешка при връзка с радара:", e));
        }

        // Стартиране веднага и настройка на таймер за точно на всеки 30 секунди (30000 милисекунди)
        fetchRealData();
        setInterval(fetchRealData, 30000);
    </script>
</body>
</html>
