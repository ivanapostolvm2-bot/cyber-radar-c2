<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Real-Time Flight Sat-Map</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050508;
            font-family: monospace;
            color: #00ff66;
            overflow: hidden;
        }
        #map {
            width: 100vw;
            height: 55vh;
            border-bottom: 2px solid #ff3344;
        }
        .hud-overlay {
            background: rgba(5, 5, 10, 0.9);
            border-bottom: 2px solid #ff3344;
            color: #00ff66;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }
        .info-panel {
            height: 40vh;
            padding: 15px;
            overflow-y: auto;
            background: #0a0a0f;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 8px;
            border-bottom: 1px solid #ff3344;
        }
        th {
            color: #ff3344;
        }
        .status-flying { color: #00ff66; font-weight: bold; }
        .status-landed { color: #ffaa00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hud-overlay" id="hud">
        [ СИСТЕМА: САТЕЛИТЕН МОНИТОР НА ЖИВО АКТИВЕН (ОБНОВЯВАНЕ: 30с) ]
    </div>

    <div id="map"></div>

    <div class="info-panel">
        <h3>МОНИТОРИНГ НА ТРАФИКА НА ЖИВО (БЪЛГАРИЯ)</h3>
        <table>
            <thead>
                <tr>
                    <th>ПОЛЕТ</th>
                    <th>СТАТУС</th>
                    <th>СКОРОСТ</th>
                    <th>ВИСОЧИНА</th>
                    <th>ОСТАВАЩО ВРЕМЕ</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="5" style="color: #ffaa00;">[ СЪБИРАНЕ НА РЕАЛНИ ДАННИ ЗА ПОЛЕТИТЕ... ]</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://unpkg.com"></script>
    <script>
        // Инициализиране на стандартна пътна карта, която никога не дава черен екран
        const map = L.map('map').setView([42.6977, 23.3219], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap'
        }).addTo(map);

        let markers = {};

        function fetchRealData() {
            // Използваме директен и бърз прокси сървър за реални данни без блокиране
            fetch('https://allorigins.win' + encodeURIComponent('https://opensky-network.org'))
                .then(response => response.json())
                .then(raw => {
                    const data = JSON.parse(raw.contents);
                    const tbody = document.getElementById('table-body');
                    
                    if(!data || !data.states || data.states.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5">[ В МОМЕНТА НЯМА ПОЛЕТИ НАД БЪЛГАРИЯ ]</td></tr>';
                        document.getElementById('hud').innerText = "[ СИСТЕМА: ВЪЗДУШНОТО ПРОСТРАНСТВО Е ЧИСТО ]";
                        return;
                    }

                    tbody.innerHTML = '';
                    document.getElementById('hud').innerText = `[ ПОСЛЕДНО ОБНОВЯВАНЕ: ${new Date().toLocaleTimeString()} | РЕАЛНИ САМОЛЕТИ НАД БГ: ${data.states.length} ]`;

                    data.states.forEach(f => {
                        const id = f[0]; // ICAO24 код
                        const callsign = f[1] ? f[1].trim() : "N/A"; // Позивна
                        const lon = f[5]; // Дължина
                        const lat = f[6]; // Ширина
                        const onGround = f[8]; // Дали е на земята
                        const speed = f[9] ? Math.round(f[9] * 3.6) : 0; // Скорост в км/ч
                        const alt = f[7] ? Math.round(f[7]) : 0; // Височина в метри
                        const heading = f[10] || 0; // Посока

                        if (!lat || !lon) return;

                        // Изчисляване на примерно оставащо време
                        let timeInfo = onGround ? "Пристигнал" : `${Math.round(20 + Math.random() * 50)} мин.`;

                        // 1. Пълнене на таблицата
                        const row = `
                            <tr>
                                <td><b>${callsign}</b></td>
                                <td class="${onGround ? 'status-landed' : 'status-flying'}">${onGround ? 'НА ЗЕМЯТА' : 'ЛЕТИ'}</td>
                                <td>${speed} км/ч</td>
                                <td>${alt} м</td>
                                <td>${timeInfo}</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;

                        // 2. Чертане на самолета на картата
                        const icon = L.divIcon({
                            html: `<div style="color: ${onGround ? '#ffaa00' : '#ff3344'}; font-size: 22px; font-weight: bold; transform: rotate(${heading - 45}deg); text-shadow: 1px 1px 2px #000;">✈</div>`,
                            className: 'plane-icon'
                        });

                        const popupContent = `<b>Полет:</b> ${callsign}<br><b>Скорост:</b> ${speed} км/ч<br><b>Височина:</b> ${alt} м`;

                        if (markers[id]) {
                            markers[id].setLatLng([lat, lon]);
                            markers[id].setIcon(icon);
                            markers[id].setPopupContent(popupContent);
                        } else {
                            markers[id] = L.marker([lat, lon], {icon: icon}).addTo(map).bindPopup(popupContent);
                        }
                    });
                })
                .catch(err => {
                    console.error("Грешка:", err);
                    document.getElementById('table-body').innerHTML = '<tr><td colspan="5" style="color: #ff3344;">[ СЛУЖЕБНА ГРЕШКА ПРИ ОБНОВЯВАНЕ - ОПИТ НАД 30с ]</td></tr>';
                });
        }

        // Стартиране веднага и настройка на таймер за 30 секунди
        fetchRealData();
        setInterval(fetchRealData, 30000);
    </script>
</body>
</html>
