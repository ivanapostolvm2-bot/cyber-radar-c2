<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Web Radar C2</title>
    <style>
        body {
            background-color: #0a0a0c;
            color: #ff3344;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            text-shadow: 0 0 10px #ff3344;
            margin-bottom: 5px;
        }
        .status {
            color: #00ff66;
            text-shadow: 0 0 8px #00ff66;
            margin-bottom: 20px;
            animation: blink 1.5s infinite;
        }
        .radar-container {
            position: relative;
            width: 300px;
            height: 300px;
            border: 2px solid #ff3344;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 51, 68, 0.2);
            background: radial-gradient(circle, rgba(255,51,68,0.05) 0%, rgba(10,10,12,1) 70%);
        }
        .radar-sweep {
            position: absolute;
            width: 100%;
            height: 100%;
            background: conic-gradient(from 0deg, rgba(255, 51, 68, 0.4) 0deg, transparent 90deg);
            border-radius: 50%;
            animation: rotate 3s linear infinite;
        }
        .dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #00ff66;
            border-radius: 50%;
            top: 40%;
            left: 65%;
            box-shadow: 0 0 10px #00ff66;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <h1>MIDNIGHT REMOTE CONTROL</h1>
    <div class="status">[ SYSTEM STATUS: ACTIVE & CONNECTED ]</div>
    
    <div class="radar-container">
        <div class="radar-sweep"></div>
        <div class="dot"></div>
    </div>

    <p style="margin-top: 20px; color: #888; font-size: 12px;">Линк за вграждане в Midnight: <span style="color: #fff;">://onrender.com</span></p>
</body>
</html>
